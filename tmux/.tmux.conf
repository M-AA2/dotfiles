# Catppuccin Mocha palette
# base       #1e1e2e
# mantle     #181825
# crust      #11111b
# surface0  #313244
# surface1  #45475a
# surface2  #585b70
# text      #cdd6f4
# subtext0  #a6adc8
# subtext1  #bac2de
# blue      #89b4fa
# lavender  #b4befe
# sapphire  #74c7ec
# teal      #94e2d5
# green     #a6e3a1
# yellow    #f9e2af
# peach     #fab387
# red       #f38ba8
# mauve     #cba6f7
# pink      #f5c2e7
# rosewater #f5e0dc

# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# basics
set -g default-terminal 'tmux-256color'
set -g escape-time 10
set -g base-index 1
set -g renumber-windows on
set -g mouse on

# vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# popup terminal
bind -T prefix t display-popup -E -w 70% -h 80%

# splitting
bind '\' split-window -h -c '#{pane_current_path}'
bind '-' split-window -v -c '#{pane_current_path}'

# status bar - top
set -g status-position top
set -g status-style 'fg=#cdd6f4,bg=#181825'
set -g status-left-length 30
set -g status-right-length 80

# left: session name
set -g status-left '#[fg=#1e1e2e,bold,bg=#{?client_prefix,#f9e2af,#89b4fa}]  #S  '

# window list
set -g window-status-separator ''
set -g window-status-format '#[fg=#a6adc8,bg=#181825]  #I: #W  '
set -g window-status-current-format '#[fg=#89b4fa,bg=#313244,bold]  #I: #W  '

# right: date time
set -g status-right '#[fg=#cdd6f4,bg=#313244]  %Y-%m-%d %H:%M  '

# message / command bar
set -g message-style 'fg=#cdd6f4,bg=#313244'
set -g message-command-style 'fg=#cdd6f4,bg=#313244'

# mode indicator
set -g mode-style 'fg=#313244,bg=#cba6f7,bold'

# pane borders
set -g pane-active-border-style 'fg=#cba6f7'
set -g pane-border-style 'fg=#313244'

# clock
set -g clock-mode-colour '#a6e3a1'
set -g clock-mode-style 24
